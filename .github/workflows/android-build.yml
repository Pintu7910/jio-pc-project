name: Build Jio PC APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install TV App Dependencies
        run: |
          cd tv-app
          npm install

      - name: Build Next.js Static Export
        run: |
          cd tv-app
          # Ye command index.html aur out folder generate karegi
          npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add and Sync Android Platform
        run: |
          cd tv-app
          # Agar android folder nahi hai toh add karega, warna sirf sync karega
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd tv-app/android
          # Gradle ko permission dena zaroori hai
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jio-pc-debug-apk
          path: tv-app/android/app/build/outputs/apk/debug/app-debug.apk
